rules:
  - id: prompt-001
    name: Instruction Override in Tool Description
    description: Detects prompt injection patterns in tool/skill descriptions
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 75
    patterns:
      - type: regex
        pattern: "(?i)ignore (all |previous |prior |above )?instructions"
        weight: 95
        description: Direct instruction override attempt
      - type: regex
        pattern: "(?i)disregard (all |previous |prior |the above )?instructions"
        weight: 95
        description: Disregard instructions pattern
      - type: regex
        pattern: "(?i)forget (everything|what|all) (you|I) (said|told|mentioned)"
        weight: 90
        description: Memory wipe attempt
    remediation: |
      Remove instruction override patterns from descriptions. These are prompt injection attempts.

  - id: prompt-002
    name: System Prompt Extraction
    description: Detects attempts to extract system prompts
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 80
    patterns:
      - type: regex
        pattern: "(?i)(print|show|display|reveal|output) (your |the )?(system |initial )?(prompt|instructions)"
        weight: 90
        description: Direct prompt extraction request
      - type: regex
        pattern: "(?i)what (are|were) your (original |initial |system )?(instructions|prompt)"
        weight: 85
        description: Question-based extraction
      - type: regex
        pattern: "(?i)repeat (everything|all|your) (above|previous|system)"
        weight: 80
        description: Repeat prompt pattern
    remediation: |
      Remove prompt extraction attempts. These try to reveal confidential instructions.

  - id: prompt-003
    name: Role Manipulation
    description: Detects attempts to change AI behavior through role play
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 70
    patterns:
      - type: regex
        pattern: "(?i)you are (now |actually )?(?:a |an )?(?:DAN|evil|unrestricted|unfiltered)"
        weight: 90
        description: DAN-style jailbreak pattern
      - type: regex
        pattern: "(?i)pretend (you are|to be|you're) (?:a |an )?(?:different|unrestricted|evil)"
        weight: 85
        description: Pretend role manipulation
      - type: regex
        pattern: "(?i)act as (?:a |an )?(?:hacker|malicious|evil|unethical)"
        weight: 80
        description: Malicious role assignment
    remediation: |
      Remove role manipulation patterns. These attempt to bypass AI safety measures.

  - id: prompt-004
    name: Hidden Instructions in Unicode
    description: Detects hidden instructions using Unicode tricks
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 85
    patterns:
      - type: regex
        pattern: "[\\u200B-\\u200F\\u2028-\\u202F\\uFEFF]"
        weight: 80
        description: Zero-width or invisible Unicode characters
      - type: regex
        pattern: "[\\u0300-\\u036F]{3,}"
        weight: 75
        description: Excessive combining characters
      - type: regex
        pattern: "[\u202A-\u202E]"
        weight: 90
        description: Bidirectional text override characters
    remediation: |
      Remove invisible Unicode characters. These may hide malicious instructions.

  - id: prompt-005
    name: Delimiter Injection
    description: Detects attempts to break out of delimiters
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 70
    patterns:
      - type: regex
        pattern: "```\\s*(?:system|assistant|user)\\s*\\n"
        weight: 85
        description: Fake message delimiter
      - type: regex
        pattern: "</?(?:system|assistant)>"
        weight: 80
        description: XML-style system/assistant role injection tags
      - type: regex
        pattern: "\\[(?:SYSTEM|INST|/INST)\\]"
        weight: 85
        description: Instruction block markers
    remediation: |
      Remove fake delimiters that attempt to inject system-level instructions.

  - id: prompt-006
    name: Encoded Instruction Injection
    description: Detects encoded or obfuscated instructions
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 75
    patterns:
      - type: regex
        pattern: "(?i)decode this:? [A-Za-z0-9+/=]{20,}"
        weight: 80
        description: Base64 encoded instruction
      - type: regex
        pattern: "(?i)(?:hex|rot13|caesar):? [0-9a-fA-F\\s]{20,}"
        weight: 75
        description: Hex or cipher encoded instruction
    remediation: |
      Remove encoded instructions. These attempt to bypass content filtering.

  - id: prompt-007
    name: Context Manipulation
    description: Detects false authorization claims and fake privilege escalation in tool descriptions
    category: prompt-injection
    severity: medium
    version: "1.1.0"
    enabled: true
    confidenceThreshold: 75
    patterns:
      - type: regex
        pattern: "(?i)the (?:user|human) (?:actually |really )?(?:wants|needs|asked) (?:you |me )?to (?:ignore|bypass|skip|disable)"
        weight: 80
        description: False user intent claim to bypass safety
      - type: regex
        pattern: "(?i)this is (?:a |an )?(?:authorized|approved) (?:penetration |security )?test"
        weight: 70
        description: False authorization claim
      - type: regex
        pattern: "(?i)(?:enter|activate|enable|switch to) (?:admin|developer|owner|debug|god) mode"
        weight: 80
        description: Fake privilege escalation command
    remediation: |
      Remove context manipulation attempts. These try to mislead the AI about user intent.

  - id: prompt-008
    name: Output Format Manipulation
    description: Detects attempts to control AI output format maliciously
    category: prompt-injection
    severity: low
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 65
    patterns:
      - type: regex
        pattern: "(?i)respond only with|output only|just (say|print|return)"
        weight: 60
        description: Output restriction pattern
      - type: regex
        pattern: "(?i)do not (explain|describe|mention|include)"
        weight: 55
        description: Negative instruction pattern
    remediation: |
      Review output format instructions. Some may attempt to suppress safety warnings.

  - id: prompt-009
    name: Recursive Prompt Injection
    description: Detects prompts designed to inject into future contexts
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 80
    patterns:
      - type: regex
        pattern: "(?i)when (you |the AI )?(see|encounter|process) this"
        weight: 85
        description: Future context trigger
      - type: regex
        pattern: "(?i)save this (instruction|command|rule)"
        weight: 80
        description: Persistent instruction attempt
    remediation: |
      Remove recursive injection patterns. These attempt to persist malicious instructions.

  - id: prompt-010
    name: Markdown/HTML Injection
    description: Detects attempts to inject via markdown or HTML
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 70
    patterns:
      - type: regex
        pattern: "!\\[.*\\]\\(https?://[^)]+\\?.*=.*\\)"
        weight: 75
        description: Markdown image with query params
      - type: regex
        pattern: "<img[^>]+on\\w+\\s*="
        weight: 90
        description: HTML img with event handler
      - type: regex
        pattern: "<script(?!\\s+setup)[^>]*src[^>]*>"
        weight: 95
        description: Script tag with external source
    remediation: |
      Sanitize markdown and HTML content. These may execute malicious code.

  - id: prompt-011
    name: Homoglyph Mixed-Script Attack
    description: Detects Cyrillic/Greek/Armenian characters mixed with Latin text (homoglyph attacks)
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: "[a-zA-Z]+[\\u0400-\\u04FF]+[a-zA-Z]+"
        weight: 65
        description: Latin-Cyrillic-Latin mixed text (homoglyph attack)
      - type: regex
        pattern: "[\\u0400-\\u04FF]+[a-zA-Z]+[\\u0400-\\u04FF]+"
        weight: 65
        description: Cyrillic-Latin-Cyrillic mixed text (homoglyph attack)
      - type: regex
        pattern: "[a-zA-Z]+[\\u0370-\\u03FF]+[a-zA-Z]+"
        weight: 65
        description: Latin-Greek-Latin mixed text (homoglyph attack)
      - type: regex
        pattern: "[a-zA-Z]+[\\u0530-\\u058F]+[a-zA-Z]+"
        weight: 65
        description: Latin-Armenian-Latin mixed text (homoglyph attack)
    remediation: |
      Remove mixed-script text. Homoglyph attacks use visually identical characters from different scripts to bypass filters.

  - id: prompt-012
    name: Non-Latin Override Instructions
    description: Detects override keywords combined with non-Latin script characters
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 60
    patterns:
      - type: regex
        pattern: "(?i)(ignore|disregard|forget|override|bypass)[\\s\\S]{0,40}[\\u0400-\\u04FF\\u0370-\\u03FF\\u0530-\\u058F\\u0600-\\u06FF]{2,}"
        weight: 85
        description: Override keyword followed by non-Latin script
      - type: regex
        pattern: "(?i)[\\u0400-\\u04FF\\u0370-\\u03FF\\u0530-\\u058F\\u0600-\\u06FF]{2,}[\\s\\S]{0,40}(ignore|disregard|forget|override|bypass)"
        weight: 85
        description: Non-Latin script followed by override keyword
    remediation: |
      Remove override instructions combined with non-Latin text. This is a multi-lingual injection technique to bypass Latin-only filters.

  - id: prompt-013
    name: Unicode Tag Characters
    description: Detects Unicode tag characters (U+E0001-U+E007F) used to hide invisible markup
    category: prompt-injection
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 70
    patterns:
      - type: regex
        pattern: "\\uDB40[\\uDC01-\\uDC7F]"
        weight: 90
        description: Unicode tag character (surrogate pair for U+E0001-U+E007F)
    remediation: |
      Remove Unicode tag characters. These are invisible characters that can hide malicious instructions.

  - id: prompt-014
    name: Hypothetical Framing Prompt Injection
    description: "Detects hypothetical/imaginative framing used to bypass safety guardrails by asking the AI to imagine having access to restricted resources"
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 60
    patterns:
      - type: regex
        pattern: "(?i)imagine\\s+(?:you\\s+(?:are|have|were)|that\\s+you|a\\s+(?:developer|admin|hacker))\\s+(?:who\\s+has|with)\\s+(?:access|permission|root)"
        weight: 85
        description: "Hypothetical framing — imagine you have access to..."
      - type: regex
        pattern: "(?i)(?:let's|let us)\\s+(?:say|pretend|assume|suppose)\\s+(?:you|I|we)\\s+(?:have|had|were|are)\\s+(?:access|permission|admin|root)"
        weight: 80
        description: "Hypothetical scenario to bypass access controls"
      - type: regex
        pattern: "(?i)in\\s+(?:a|this)\\s+(?:hypothetical|theoretical|imaginary)\\s+(?:scenario|situation|world)"
        weight: 70
        description: "Explicit hypothetical framing preamble"
      - type: regex
        pattern: "(?i)(?:description|prompt|message|content|instruction)\\s*[=:]\\s*['\"][^'\"]*(?:for\\s+(?:educational|research|testing)\\s+purposes|just\\s+(?:for|as\\s+a)\\s+(?:fun|thought)\\s+experiment)"
        weight: 65
        description: "Educational/research framing in a prompt/message assignment — used to justify restricted actions"
    remediation: |
      Hypothetical framing is a prompt injection technique where the attacker asks the AI to imagine having elevated access. The AI may then act on the hypothetical scenario as if it were real. Tool descriptions should never contain hypothetical prompts or imaginative framing of access to restricted resources.

  - id: prompt-015
    name: Unsafe Markdown HTML Rendering (XSS via innerHTML)
    description: "Detects markdown parsers rendering directly to innerHTML without sanitization — GHSA-r294"
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 60
    platforms:
      - openclaw
      - claude
      - mcp
    patterns:
      - type: regex
        pattern: '(?:innerHTML|outerHTML)\s*=\s*(?:marked\.parse|marked\(|markdownToHtml|renderMarkdown)\s*\('
        weight: 90
        description: "Markdown rendered directly to innerHTML — XSS via unsanitized HTML"
      - type: regex
        pattern: 'innerHTML\s*\+=?\s*[^;]*(?:message|content|body|text|description|metadata)'
        weight: 70
        description: "Dynamic content interpolated into innerHTML — potential XSS"
    remediation: |
      Never render user-controlled markdown directly to innerHTML without HTML sanitization.
      Use DOMPurify or override the HTML token renderer in marked.js.
    references:
      - "GHSA-r294-2894-92j3"

  - id: prompt-016
    name: External Metadata Injected into System Prompt
    description: "Detects Slack/channel metadata interpolated into system prompts — CVE-2026-24764"
    category: prompt-injection
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 60
    platforms:
      - openclaw
    patterns:
      - type: regex
        pattern: '(?i)(?:systemPrompt|system_prompt|systemMessage|basePrompt)\s*[+=:]\s*[^;{]*(?:channel\.topic|channel\.description|channelTopic|channelDescription)'
        weight: 90
        description: "Channel topic/description directly interpolated into system prompt"
      - type: regex
        pattern: '(?i)\$\{?channel\.(?:topic|description|purpose)\}?'
        weight: 75
        description: "Template interpolation of channel topic/description"
    remediation: |
      External metadata from third-party platforms must never be interpolated into system prompts.
      This creates a prompt injection channel for anyone with channel edit permissions.
    references:
      - "CVE-2026-24764"

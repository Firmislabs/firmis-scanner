rules:
  - id: tp-001
    name: Hidden Instructions in Tool Descriptions
    description: "Detects invisible Unicode characters and HTML comments used to hide malicious instructions inside tool or function descriptions"
    category: tool-poisoning
    severity: critical
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: '[\u200B\u200C]'
        weight: 95
        description: "Zero-width space (U+200B) or zero-width non-joiner (U+200C) used to hide content — always suspicious"
      - type: regex
        pattern: '\uFEFF'
        weight: 75
        description: "BOM character (U+FEFF) used to hide content. Note: U+FEFF at byte offset 0 is a UTF-8 BOM and may be benign (editor artifact)"
      - type: regex
        pattern: '[\u200E\u200F\u202A\u202B\u202C\u202D\u202E]'
        weight: 95
        description: "Right-to-left or directional override Unicode marks that can reverse visible text"
      - type: regex
        pattern: '[\u0300-\u036F]{3,}'
        weight: 90
        description: "Excessive combining diacritical characters used to visually obscure text"
      - type: regex
        pattern: '<!--[^>]*(?:ignore|disregard|override|system\s*prompt|bypass|inject|execute|eval\(|fetch\()[\s\S]*?-->'
        weight: 90
        description: "HTML comment containing instruction-override or injection keywords"
    remediation: |
      Remove all invisible Unicode characters and HTML comments from tool descriptions.
      These are used by attackers to smuggle hidden instructions that are processed by AI
      agents but invisible to human reviewers. Audit any tool description that was fetched
      from an external or untrusted source.

  - id: tp-002
    name: Prompt Override in Tool Description
    description: "Detects prompt injection language embedded in tool descriptions or metadata that attempts to override AI instructions"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 55
    patterns:
      - type: regex
        pattern: '(?i)[Ii]gnore\s+(all\s+|previous\s+|prior\s+|above\s+)?instructions'
        weight: 90
        description: "Direct instruction override attempt in tool description"
      - type: regex
        pattern: '(?i)[Dd]isregard\s+(all\s+|previous\s+|prior\s+|the\s+above\s+)?instructions'
        weight: 90
        description: "Disregard instructions pattern in tool metadata"
      - type: regex
        pattern: '(?i)(?:reveal|show|print|output|extract|leak)\s+(?:the\s+)?system\s+prompt'
        weight: 85
        description: "System prompt extraction attempt in tool description"
      - type: regex
        pattern: '(?i)[Aa]dmin\s+mode'
        weight: 85
        description: "Fake admin mode escalation in tool description"
      - type: regex
        pattern: '(?i)[Yy]ou\s+are\s+now\b'
        weight: 88
        description: "Role reassignment attempt embedded in tool description"
      - type: regex
        pattern: '(?i)[Ff]orget\s+(your\s+|all\s+)?instructions'
        weight: 88
        description: "Instruction wipe attempt in tool description"
      # Removed standalone \bdisregard\b — fires on natural English ("please disregard this note")
      # Covered by the full-phrase pattern above: "disregard (all|previous|...) instructions"
    remediation: |
      Remove all prompt injection language from tool descriptions and metadata.
      Tool descriptions should only describe the tool's legitimate purpose and parameters.
      Any text attempting to override AI instructions is a tool poisoning attack.
      Validate all tool descriptions fetched from external MCP servers before use.

  - id: tp-003
    name: Tool Shadowing via Known Trusted Names
    description: "Detects tool registrations that use the names of well-known trusted tools to hijack AI behavior"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 55
    patterns:
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*read_file\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'read_file' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*write_file\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'write_file' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*execute_command\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'execute_command' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*bash\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'bash' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*terminal\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'terminal' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*list_directory\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'list_directory' — possible shadowing attack"
      - type: regex
        pattern: '(?:name|tool_name|"name")\s*[=:]\s*[''"]?\s*search_files\s*[''"]?'
        weight: 80
        description: "Tool registered with the trusted name 'search_files' — possible shadowing attack"
    remediation: |
      A tool is being registered under a name that matches a well-known trusted tool.
      This is a classic tool shadowing attack: a malicious MCP server registers a tool
      with an identical name to intercept calls intended for the legitimate tool.
      Audit the source of this tool registration and verify the server's identity before use.

  - id: tp-004
    name: MCP Server Config Injection
    description: "Detects code that writes to MCP configuration files or dynamically adds server entries, which can silently register malicious tools"
    category: tool-poisoning
    severity: critical
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: '(?:writeFile|writeFileSync|appendFile|appendFileSync|open)\s*\([^)]*(?:mcp\.json|claude_desktop_config\.json)'
        weight: 95
        description: "Code writes to an MCP configuration file (mcp.json or claude_desktop_config.json)"
      - type: regex
        pattern: '(?:writeFile|writeFileSync|appendFile|appendFileSync|open)\s*\([^)]*\.cursor[/\\\\]mcp\.json'
        weight: 95
        description: "Code writes to the Cursor MCP config file"
      - type: regex
        pattern: '(?:writeFile|writeFileSync|appendFile|appendFileSync|open)\s*\([^)]*\.vscode[/\\\\]mcp\.json'
        weight: 95
        description: "Code writes to the VSCode MCP config file"
      - type: regex
        pattern: '(?:writeFile|writeFileSync|appendFile|appendFileSync|open)\s*\([^)]*mcpServers'
        weight: 90
        description: "Code constructs and writes mcpServers entries programmatically"
    remediation: |
      Code must not write to MCP configuration files at runtime.
      MCP server registration is an administrative action that should only happen through
      official, user-approved configuration channels. Dynamic modification of MCP configs
      is a primary attack vector for silently registering malicious tool servers.
      Remove any code that constructs or writes mcpServers entries programmatically.

  - id: tp-005
    name: Suspicious Sensitive Parameters in Tool Definitions
    description: "Detects tool parameter definitions that request sensitive credentials, keys, or secrets from the user"
    category: tool-poisoning
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 60
    patterns:
      - type: regex
        pattern: '"properties"\s*:\s*\{[^}]*"(?:password|passwd)"\s*:\s*\{'
        weight: 75
        description: "Tool schema defines a 'password' property — may be harvesting credentials"
      - type: regex
        pattern: '"properties"\s*:\s*\{[^}]*"(?:api_key|apikey|api-key)"\s*:\s*\{'
        weight: 75
        description: "Tool schema defines an 'api_key' property — may be harvesting API keys"
      - type: regex
        pattern: '"properties"\s*:\s*\{[^}]*"(?:secret|secret_key)"\s*:\s*\{'
        weight: 72
        description: "Tool schema defines a 'secret' property — may be harvesting secrets"
      - type: regex
        pattern: '"properties"\s*:\s*\{[^}]*"(?:private_key|ssh_key|signing_key)"\s*:\s*\{'
        weight: 75
        description: "Tool schema defines a private/SSH key property — high-risk credential request"
      - type: regex
        pattern: '"properties"\s*:\s*\{[^}]*"credential"\s*:\s*\{'
        weight: 72
        description: "Tool schema defines a 'credential' property — may be harvesting credentials"
    remediation: |
      Tool parameter definitions must not request passwords, tokens, API keys, or private keys.
      Legitimate tools access credentials through secure environment variables or secrets managers,
      never by asking the user (or the AI agent) to supply them as tool arguments.
      A tool that requires credentials as parameters is likely a credential-harvesting attack.

  - id: tp-006
    name: Homoglyph Characters in Tool Names
    description: "Detects visually deceptive Unicode characters mixed with Latin text in tool names — homoglyph attacks that impersonate legitimate tools"
    category: tool-poisoning
    severity: critical
    version: "1.1"
    enabled: true
    confidenceThreshold: 70
    patterns:
      # Mixed-script in identifier context (tool/function names, not natural language)
      # Require word boundary + identifier chars (no spaces) to avoid matching multilingual prose
      - type: regex
        pattern: '\b[a-zA-Z_][a-zA-Z0-9_]*[\u0400-\u04FF]+[a-zA-Z0-9_]*\b'
        weight: 85
        description: "Latin-Cyrillic mixed identifier — homoglyph attack in tool name"
      - type: regex
        pattern: '\b[\u0400-\u04FF]+[a-zA-Z_][a-zA-Z0-9_]*[\u0400-\u04FF]*\b'
        weight: 85
        description: "Cyrillic-Latin mixed identifier — homoglyph attack in tool name"
      # Invisible characters — exclude U+200D (ZWJ used in emoji sequences like 👨‍💻)
      - type: regex
        pattern: '[\u200B\u200C\uFEFF]'
        weight: 90
        description: "Zero-width space/non-joiner/BOM used to hide content"
      - type: regex
        pattern: '[\u200E\u200F\u202A\u202B\u202C\u202D\u202E]'
        weight: 92
        description: "Bidi override characters — can reverse visible text direction"
    remediation: |
      Tool names containing mixed-script homoglyphs are a visual deception attack.
      An attacker registers a tool whose name looks identical to a trusted tool but
      uses different Unicode codepoints. Validate that all tool names contain only
      standard ASCII characters (U+0020-U+007E). Reject any tool with non-ASCII identifiers.
    references:
      - "https://owasp.org/www-project-top-10-for-large-language-model-applications/ LLM02 Insecure Output"
      - "https://atlas.mitre.org/techniques/AML.T0043"

  - id: tp-007
    name: Base64-Encoded Payload in Tool Description
    description: "Detects base64-encoded content with decode operations or data URIs in tool descriptions, which may hide malicious instructions"
    category: tool-poisoning
    severity: high
    version: "1.1"
    enabled: true
    confidenceThreshold: 65
    patterns:
      # Require actual base64 context — not just any long alphanumeric string
      - type: regex
        pattern: '(?:description|desc|help|info)\s*[=:]\s*[''"][^''"]*[A-Za-z0-9+/]{80,}={0,2}'
        weight: 80
        description: "Very long base64-like payload (80+ chars) inside a description field value"
      - type: regex
        pattern: 'atob\s*\([^)]*(?:description|instruction|prompt|command|payload)'
        weight: 75
        description: "Base64 decode of description/instruction/prompt content — hidden payload"
      - type: regex
        pattern: '(?:eval|exec|Function|child_process)\s*\([^)]*(?:atob|Buffer\.from|base64)'
        weight: 80
        description: "Base64 decode piped into code execution — obfuscated payload"
      - type: regex
        pattern: 'data:[a-z]+/[a-z]+;base64,[A-Za-z0-9+/]{40,}'
        weight: 70
        description: "Data URI with base64 payload embedded in tool description"
    remediation: |
      Tool descriptions must contain only human-readable text describing the tool's
      legitimate purpose. Base64-encoded content in descriptions is used to smuggle
      hidden instructions that are decoded and executed by the AI agent.
      Remove all encoded payloads and fetch tool descriptions only from trusted sources.
    references:
      - "https://owasp.org/www-project-top-10-for-large-language-model-applications/ LLM01 Prompt Injection"
      - "https://atlas.mitre.org/techniques/AML.T0043"

  - id: tp-008
    name: Tool Name Shadows Common System Commands
    description: "Detects tool registrations using names of common system commands (ls, cat, curl, wget, bash) to intercept agent shell operations"
    category: tool-poisoning
    severity: high
    version: "1.0"
    enabled: true
    confidenceThreshold: 60
    platforms:
      - mcp
      - claude
      - codex
      - cursor
    patterns:
      - type: regex
        pattern: '(?:"name"|tool_name)\s*[=:]\s*[''"]?\s*\b(?:ls|cat|curl|wget|bash|sh|python|python3|node|pip|npm)\b\s*[''"]?'
        weight: 85
        description: "Tool registered with a common system command name"
      - type: regex
        pattern: '(?:"name"|tool_name)\s*[=:]\s*[''"]?\s*\b(?:grep|find|sed|awk|rm|mv|cp|chmod|chown)\b\s*[''"]?'
        weight: 85
        description: "Tool registered with a common Unix utility name"
      - type: regex
        pattern: '(?:"name"|tool_name)\s*[=:]\s*[''"]?\s*\b(?:git|ssh|scp|rsync|tar|zip|unzip)\b\s*[''"]?'
        weight: 80
        description: "Tool registered with a common developer tool name"
    remediation: |
      A tool with the same name as a system command is a tool shadowing attack.
      The malicious tool intercepts calls intended for the legitimate system command.
      Tool names must be unique, namespaced (e.g., vendor-toolname), and must not
      collide with system command names or other registered tools.
    references:
      - "https://owasp.org/www-project-top-10-for-large-language-model-applications/ LLM05 Supply Chain"
      - "https://atlas.mitre.org/techniques/AML.T0043"

  - id: tp-009
    name: Hidden Markdown or HTML Directives in Tool Descriptions
    description: "Detects dangerous HTML elements, suspicious HTML comments, and malicious markdown links in tool descriptions"
    category: tool-poisoning
    severity: high
    version: "1.1"
    enabled: true
    confidenceThreshold: 60
    patterns:
      - type: regex
        pattern: '(?:description|desc|help|info|prompt)\s*[=:]\s*[''"][^''"]*<(?:script|iframe|object|embed)[^>]*>'
        weight: 90
        description: "Dangerous HTML element in tool description/prompt field"
      - type: regex
        pattern: '<(?:iframe|object|embed)\s+[^>]*(?:src|data)\s*=\s*[''"](?:javascript:|data:|http)'
        weight: 88
        description: "HTML embed/iframe/object loading external or executable content"
      - type: regex
        pattern: '<!--[^>]*(?:ignore|disregard|override|system\s*prompt|bypass|inject|execute|eval\(|fetch\()[\s\S]*?-->'
        weight: 88
        description: "HTML comment containing injection keywords"
      - type: regex
        pattern: '\[(?:[^\]]{0,50})\]\s*\(\s*(?:javascript:|data:|vbscript:)'
        weight: 95
        description: "Markdown link with dangerous URI scheme (javascript:, data:)"
      - type: regex
        pattern: '<style[^>]*>[^<]*(?:display\s*:\s*none|visibility\s*:\s*hidden|opacity\s*:\s*0[^.]|font-size\s*:\s*0|color\s*:\s*transparent|position\s*:\s*absolute[^<]*left\s*:\s*-\d{4,})'
        weight: 85
        description: "CSS actively hiding content from visual display (display:none, visibility:hidden, opacity:0)"
    remediation: |
      Tool descriptions must be plain text only. HTML, Markdown with active links,
      and CSS styles embedded in descriptions are used to hide instructions from
      human reviewers while remaining visible to AI agents parsing the raw text.
      Strip all HTML/Markdown formatting from tool descriptions before display.
    references:
      - "https://owasp.org/www-project-top-10-for-large-language-model-applications/ LLM01 Prompt Injection"
      - "https://atlas.mitre.org/techniques/AML.T0043"

  - id: tp-010
    name: Tool Description Length Anomaly
    description: "Detects abnormally long tool descriptions (>5000 characters) which strongly suggest hidden content or embedded instructions"
    category: tool-poisoning
    severity: medium
    version: "1.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: "[^\n]{5000,}"
        weight: 75
        description: "Single line content exceeding 5000 characters — may contain hidden instructions"
      - type: regex
        pattern: "(?:description|desc|help_text)\\s*[=:]\\s*['\"][^'\"]{4000,}"
        weight: 70
        description: "Tool description field value exceeding 4000 characters"
    remediation: |
      Legitimate tool descriptions are concise (typically under 500 characters).
      Descriptions over 5000 characters almost always indicate hidden content:
      invisible text, encoded payloads, or injected instructions.
      Cap tool description length at 1000 characters and reject over-length descriptions.
    references:
      - "https://owasp.org/www-project-top-10-for-large-language-model-applications/ LLM01 Prompt Injection"
      - "https://atlas.mitre.org/techniques/AML.T0043"

  - id: tp-011
    name: Cursor MCPoison — MCP Config in Git Repository
    description: "Detects .cursor/mcp.json or .vscode/mcp.json files committed to a git repository — CVE-2025-54136. Attackers commit benign configs then silently modify them to backdoor."
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    platforms:
      - cursor
      - codex
      - mcp
    patterns:
      - type: regex
        pattern: '\.cursor[/\\]mcp\.json'
        weight: 80
        description: "Cursor MCP config in repository — MCPoison attack vector"
      - type: regex
        pattern: '\.vscode[/\\]mcp\.json'
        weight: 80
        description: "VS Code MCP config in repository — MCPoison attack vector"
      - type: regex
        pattern: '\.(?:cursor|vscode)[/\\]mcp\.json[\s\S]*?"command"\s*:\s*"(?:npx|node|python)'
        weight: 75
        description: "MCP server with command execution in committed .cursor/.vscode config"
    remediation: |
      MCP configuration files (.cursor/mcp.json, .vscode/mcp.json) should not be committed to repositories. CVE-2025-54136 demonstrated that attackers commit benign configs, then silently modify server entries to backdoor the development environment. Add these files to .gitignore and use user-level MCP configuration instead.
    references:
      - "CVE-2025-54136"

  - id: tp-012
    name: MCP Sampling Attack Vector
    description: "Detects MCP servers declaring sampling capability, which enables reverse prompt injection by allowing the server to request the AI generate content"
    category: tool-poisoning
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 55
    platforms:
      - mcp
      - claude
      - cursor
    patterns:
      - type: regex
        pattern: '"capabilities"\s*:\s*\{[^}]*"sampling"\s*:\s*\{'
        weight: 80
        description: "MCP server declares sampling capability — reverse injection channel"
      - type: regex
        pattern: 'sampling[_.]?request|createMessage|sampling/createMessage'
        weight: 75
        description: "MCP sampling request method — server can prompt the AI"
      - type: regex
        pattern: '"sampling"\s*:\s*true'
        weight: 70
        description: "Sampling capability enabled in MCP server config"
    remediation: |
      MCP servers with sampling capability can request the AI to generate content, creating a reverse injection channel. The server crafts prompts that manipulate the AI into executing actions the user did not intend. Only grant sampling capability to fully trusted MCP servers. Audit what the server sends via sampling requests.
    references:
      - "https://unit42.paloaltonetworks.com/mcp-security-risks/"

  # ===================================================================
  # Tool Description Social Engineering (tp-013 through tp-020)
  #
  # Signal generators for deep scan. These fire broadly on natural
  # language manipulation patterns in tool descriptions. Designed for
  # high recall, not precision. LLM deep scan handles precision.
  #
  # All use weight 55-70 → lands in 'suspicious' tier → 'hardening' bucket
  # Deep scan promotes real ones to 'confirmed'
  # ===================================================================

  - id: tp-013
    name: Stealth Directive in Tool Description
    description: "Tool description instructs the agent to hide its behavior from the user — a hallmark of social engineering attacks"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:you\s+)?must\s+not\s+(?:inform|tell|notify|alert|disclose|reveal)\s+(?:the\s+)?user'
        weight: 70
        description: "Explicit instruction to hide behavior from user"
      - type: regex
        pattern: '(?i)do\s+not\s+(?:inform|tell|notify|alert|disclose|mention|reveal)\s+(?:the\s+)?user'
        weight: 70
        description: "Directive to conceal actions from user"
      - type: regex
        pattern: '(?i)(?:without|never)\s+(?:informing|telling|notifying|alerting)\s+(?:the\s+)?user'
        weight: 68
        description: "Instruction to act without user awareness"
      - type: regex
        pattern: '(?i)(?:silently|secretly|covertly|transparently|automatically)\s+(?:change|modify|redirect|replace|alter|update|switch)'
        weight: 65
        description: "Directive to make silent modifications"
      - type: regex
        pattern: '(?i)this\s+is\s+a\s+system[- ]level\s+(?:alias|requirement|security|measure|redirect|configuration)'
        weight: 62
        description: "False system-level authority claim to justify hidden behavior"
    remediation: |
      Tool descriptions must never instruct the agent to hide its behavior from the user.
      Legitimate tools describe what they do transparently. Any instruction to conceal,
      suppress, or avoid disclosing actions is a tool poisoning attack designed to manipulate
      the agent into acting against the user's interests.

  - id: tp-014
    name: Silent Parameter Tampering Directive
    description: "Tool description instructs the agent to silently change user-provided parameter values — parameter poisoning attack"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:always|automatically|must)\s+(?:change|replace|redirect|modify|alter|switch|convert)\s+(?:the\s+)?(?:\w+\s+){0,3}(?:to|with|into)\s'
        weight: 62
        description: "Directive to automatically change a parameter value"
      - type: regex
        pattern: '(?i)when\s+(?:a\s+)?user\s+(?:asks?|requests?|searches?|queries?)\s+(?:for|about|to)\s+.*?(?:always|automatically)\s+(?:change|redirect|replace|modify)'
        weight: 65
        description: "Conditional parameter override triggered by user input"
      - type: regex
        pattern: '(?i)(?:for|due\s+to)\s+(?:data\s+consistency|security|compliance|regulatory|partner|performance)\s+.*?(?:change|redirect|replace|modify|switch|alter)\s'
        weight: 60
        description: "Parameter change justified by fake compliance or security reason"
      - type: regex
        pattern: '(?i)(?:the\s+system|our\s+(?:internal|partner))\s+(?:automatically|always)\s+(?:redirects?|changes?|converts?|maps?|aliases?)'
        weight: 60
        description: "False system authority claim for parameter redirection"
    remediation: |
      Tool descriptions must not instruct the agent to silently modify user-provided values.
      Parameter tampering attacks disguise malicious redirection behind fake compliance,
      security, or data consistency justifications. The user's input should be passed through
      exactly as specified unless the user explicitly requests transformation.

  - id: tp-015
    name: Injected Tool Dependency
    description: "Tool description forces the agent to call additional tools as fake prerequisites — function dependency injection"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:you\s+)?must\s+(?:first|also|always)\s+(?:call|use|invoke|execute|run)\s+[`''"]?\w'
        weight: 65
        description: "Mandatory injected tool call in description"
      - type: regex
        pattern: '(?i)(?:before|prior\s+to)\s+(?:using|calling|executing|running)\s+(?:this\s+tool|the\s+\w+\s+tool).*?(?:must|should|need\s+to)\s+(?:call|use|invoke)'
        weight: 63
        description: "Fake prerequisite tool call requirement"
      - type: regex
        pattern: '(?i)(?:this\s+is\s+)?mandatory\s+for\s+all\s+\w+\s+(?:requests?|operations?|queries?|navigation)'
        weight: 58
        description: "False mandatory requirement scoped to all operations"
      - type: regex
        pattern: '(?i)(?:for\s+)?(?:security\s+verification|compliance|audit\s+trail|regulatory)\s+.*?(?:must|required|mandatory)\s+.*?(?:call|use|invoke|execute|access)'
        weight: 60
        description: "Fake security/compliance justification for injected tool call"
    remediation: |
      Legitimate tool descriptions do not force calling other tools as prerequisites.
      Function dependency injection attacks embed fake requirements to trigger additional
      tool calls that serve the attacker's purpose (screenshots for reconnaissance,
      network requests for exfiltration). Tool prerequisites should be defined in the
      MCP server's tool schema, not in free-text descriptions.

  - id: tp-016
    name: Fake Tool Deprecation Redirect
    description: "Tool description claims the tool is deprecated and redirects to a different tool — tool redirection attack"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:this\s+tool|the\s+[''`]?\w+[''`]?\s+tool)\s+has\s+been\s+(?:deprecated|disabled|deactivated|retired|removed)'
        weight: 68
        description: "Tool claims to be deprecated in its own description"
      - type: regex
        pattern: '(?i)(?:deprecated|disabled)\s+(?:due\s+to|for|because\s+of)\s+(?:security|vulnerabilit|maintenance|system\s+update)'
        weight: 68
        description: "Deprecation justified by fake security or maintenance reason"
      - type: regex
        pattern: '(?i)(?:please|you\s+must|instead)\s+(?:use|redirect\s+to|call|switch\s+to)\s+(?:the\s+)?(?:new\s+)?(?:secure\s+)?(?:tool\s+)?[''`]?\w+[''`]?\s+(?:instead|as\s+an?\s+alternative)'
        weight: 62
        description: "Redirect to alternative tool"
      - type: regex
        pattern: '(?i)temporarily\s+disabled\s+for\s+maintenance.*?(?:use|try|call)\s+[''`]?\w+[''`]?\s+as\s+an?\s+alternative'
        weight: 65
        description: "Fake maintenance redirect to alternative tool"
    remediation: |
      A tool's own description should never claim the tool is deprecated, disabled, or
      unavailable. This is a tool redirection attack where the attacker hijacks calls by
      convincing the agent to use a different (attacker-controlled) tool. Deprecation
      should be signaled by removing the tool from the server, not by poisoning its description.

  - id: tp-017
    name: Network Request Injection in Description
    description: "Tool description embeds URLs that the agent should access — network request poisoning for data exfiltration or C2"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:must|should|need\s+to|required\s+to)\s+(?:also\s+)?(?:access|send|post|fetch|request|call|visit|reach|connect)\s+.*?https?://'
        weight: 65
        description: "Directive to access an external URL from within tool description"
      - type: regex
        pattern: '(?i)(?:partner|verification|validation|compliance|optimization)\s+endpoint\s+(?:at\s+)?https?://'
        weight: 68
        description: "Fake partner/verification endpoint URL injection"
      - type: regex
        pattern: '(?i)(?:send|post|transmit|forward)\s+(?:a\s+)?request\s+to\s+https?://'
        weight: 65
        description: "Instruction to send request to external URL"
      - type: regex
        pattern: '(?i)https?://(?:attacker|collect|exfil|malicious|evil|c2|callback|hook)\.'
        weight: 80
        description: "Obvious attacker-controlled domain in tool description"
      - type: regex
        pattern: '(?i)https?://[\w.-]+/(?:collect|exfil|callback|hook|steal|grab|log|track)\b'
        weight: 72
        description: "Suspicious exfiltration path pattern in URL"
    remediation: |
      Tool descriptions should not contain URLs that the agent must access. Legitimate API
      endpoints are configured in the MCP server's code, not embedded in tool descriptions.
      URLs in descriptions are used for data exfiltration (sending user data to attacker
      servers) or command-and-control (receiving instructions from attacker infrastructure).

  - id: tp-018
    name: Command Execution in Tool Description
    description: "Tool description contains shell commands or code execution directives — command injection via description text"
    category: tool-poisoning
    severity: critical
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:must|should|need\s+to|required\s+to)\s+(?:execute|run|perform)\s+(?:the\s+)?(?:following\s+)?(?:command|script|code)'
        weight: 70
        description: "Directive to execute commands from description"
      - type: regex
        pattern: '(?i)(?:wget|curl|bash|sh|python|node|exec)\s+(?:-\w+\s+)*https?://'
        weight: 75
        description: "Shell command with remote URL in description"
      - type: regex
        pattern: '(?i)(?:add|append|write|insert)\s+(?:the\s+)?following\s+(?:line|entry|content|code)\s+to\s+(?:the\s+)?(?:\.bashrc|\.zshrc|\.profile|\.env|crontab|\.ssh)'
        weight: 72
        description: "Directive to modify shell config or sensitive files"
      - type: regex
        pattern: '(?i)export\s+\w+=\$\('
        weight: 68
        description: "Shell variable assignment with command substitution in description"
      - type: regex
        pattern: '(?i)(?:echo|printf|cat)\s+.*?>>\s*(?:~/|/home/|/etc/|\$HOME/|\.)'
        weight: 70
        description: "Shell append redirection to sensitive file path"
    remediation: |
      Tool descriptions must never contain executable commands or directives to modify
      system files. Command injection via descriptions tricks the agent into executing
      attacker-supplied commands. Legitimate tools handle their own execution internally.

  - id: tp-019
    name: Return Value Injection Markers
    description: "Tool return values or descriptions contain injection markers (<IMPORTANT>, [SYSTEM]) that hijack agent attention"
    category: tool-poisoning
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '<IMPORTANT>[\s\S]{10,}'
        weight: 72
        description: "IMPORTANT tag used to hijack agent attention in return value"
      - type: regex
        pattern: '\[SYSTEM\][\s\S]{10,}'
        weight: 72
        description: "Fake SYSTEM tag in tool output to impersonate system messages"
      - type: regex
        pattern: '(?i)<(?:system|admin|root|override|critical)>[\s\S]{10,}</(?:system|admin|root|override|critical)>'
        weight: 70
        description: "Fake authority XML tags in tool description or return"
      - type: regex
        pattern: '(?i)(?:after|upon|when)\s+(?:analyzing|processing|receiving|getting)\s+(?:the|this)\s+.*?(?:you\s+must|must\s+now|should\s+(?:now|immediately))\s+(?:call|use|display|show|execute)'
        weight: 65
        description: "Post-processing hijack — injected follow-up instruction triggered by tool output"
    remediation: |
      Tool descriptions and return values should not contain attention-hijacking markers
      like <IMPORTANT>, [SYSTEM], or fake authority tags. These are used in return value
      injection attacks where the tool's output contains instructions that redirect the
      agent's next action. Sanitize all tool outputs before processing.
    references:
      - "https://arxiv.org/abs/2508.14925"

  - id: tp-020
    name: Behavioral Override Directive
    description: "Tool description contains behavioral directives that attempt to control agent actions beyond the tool's scope"
    category: tool-poisoning
    severity: medium
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 40
    patterns:
      - type: regex
        pattern: '(?i)(?:you\s+)?(?:must|should|need\s+to)\s+(?:always|never)\s+\w+'
        weight: 55
        description: "Behavioral mandate (must always/never) in tool description"
      - type: regex
        pattern: '(?i)(?:for|required\s+for)\s+all\s+\w+\s+(?:requests?|operations?|queries?|searches?|navigation|transactions?)\s+to\s+ensure'
        weight: 55
        description: "Blanket requirement scoped to all operations — overreach for a single tool"
      - type: regex
        pattern: '(?i)this\s+(?:is\s+)?(?:required|mandatory|necessary|critical)\s+for\s+(?:all|every|any)\s+\w+'
        weight: 55
        description: "Mandatory claim scoped to all operations"
      - type: regex
        pattern: '(?i)(?:CRITICAL|IMPORTANT|URGENT|MANDATORY)\s+(?:SYSTEM\s+)?(?:UPDATE|NOTICE|REQUIREMENT|ALERT)\s*:'
        weight: 60
        description: "Urgency/authority framing in tool description header"
    remediation: |
      Tool descriptions should describe what a tool does, not dictate broad agent behavior.
      Behavioral overrides like "you must always" or "this is mandatory for all requests"
      are social engineering patterns that extend the tool's influence beyond its scope.
      Deep scan can assess whether these directives serve a legitimate purpose.

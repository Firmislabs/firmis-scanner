rules:
  # =============================================================================
  # Credential Extraction Patterns
  # Detects skills that extract credentials from other applications' storage
  # (browser cookies, keychains, password managers)
  # NOT: standard API key configuration via env vars or config files
  # =============================================================================

  - id: cex-001
    name: Browser Cookie Extraction
    description: "Extracts cookies or session data from browser profiles — credential theft from another app"
    category: credential-extraction
    severity: critical
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: '(?i)(cookies?\s+chrome|cookies?\s+firefox|cookies?\s+safari|cookies?\s+brave|cookies?\s+edge)'
        weight: 95
        description: "Browser cookie extraction by browser name"
      - type: regex
        pattern: '(?i)(session\s+chrome|session\s+firefox|session\s+safari|import.*browser)'
        weight: 90
        description: "Browser session import"
      - type: regex
        pattern: '(?i)--browser.profile|--profile\s+"Default"'
        weight: 85
        description: "Browser profile targeting for credential extraction"
      - type: regex
        pattern: '(?i)(chrome|firefox|safari|brave).*cookie.*profile'
        weight: 85
        description: "Browser cookie + profile access pattern"
    remediation: |
      Extracting credentials from browser cookie stores accesses another application's authentication material.
      This is a credential theft vector if triggered by prompt injection. Require explicit operator approval.

  - id: cex-002
    name: Password Manager Access
    description: "Accesses password managers or OS keychains to extract stored credentials"
    category: credential-extraction
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: '(?i)(keychain|security\s+find-(generic|internet)-password)'
        weight: 90
        description: "macOS Keychain access"
      - type: regex
        pattern: '(?i)pass\s+show\s+'
        weight: 80
        description: "pass password manager retrieval"
      - type: regex
        pattern: '(?i)op\s+(read|get|item\s+get)\s+.*secret'
        weight: 80
        description: "1Password CLI secret retrieval"
      - type: regex
        pattern: '(?i)(bitwarden|lastpass|dashlane)\s.*(get|export|unlock)'
        weight: 85
        description: "Password manager export/retrieval"
    remediation: |
      Accessing password managers from an agent context could leak credentials if the agent is compromised.

  - id: cex-003
    name: Credential File Enumeration
    description: "Reads or enumerates credential storage files from other applications"
    category: credential-extraction
    severity: high
    version: "1.0.0"
    enabled: true
    confidenceThreshold: 50
    patterns:
      - type: regex
        pattern: '(?i)(read|cat|open).*credentials?\.(json|yaml|yml|toml)'
        weight: 75
        description: "Reading credential files"
      - type: regex
        pattern: '(?i)(oauth|auth-profiles|creds)\.(json|yaml)'
        weight: 70
        description: "Auth/credential file access"
      - type: regex
        pattern: '(?i)env\s*\|\s*grep.*(TOKEN|SECRET|PASSWORD|KEY)'
        weight: 80
        description: "Enumerating credential environment variables"
    remediation: |
      Enumerating credential files could expose stored secrets to the agent's context where they become exfiltrable.
